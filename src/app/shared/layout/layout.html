<mat-sidenav-container class="container">

    <mat-sidenav #sidenav [mode]="isMobile ? 'over' : 'side'" [opened]="!isMobile" class="sidenav">

        <h3 class="logo">Task Dashboard</h3>

        <mat-nav-list>
            <a mat-list-item routerLink="/dashboard" (click)="closeIfMobile()">Dashboard</a>
            <a mat-list-item routerLink="/tasks" (click)="closeIfMobile()">Tasks</a>
        </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content>
        <mat-toolbar color="primary">

            <!-- BOTÃO MENU (só no mobile) -->
            <button mat-icon-button *ngIf="isMobile" (click)="sidenav.toggle()">
                <mat-icon>menu</mat-icon>
            </button>

            <span>Task Dashboard</span>

            <span class="spacer"></span>

            <button mat-icon-button (click)="toggleTheme()">
                <mat-icon>
                    {{ theme.getTheme() ? 'light_mode' : 'dark_mode' }}
                </mat-icon>
            </button>

        </mat-toolbar>

        <main class="content">
            <router-outlet></router-outlet>
        </main>

    </mat-sidenav-content>
</mat-sidenav-container>
